{% extends 'base.html' %}
{% block title %}Sign In — Ano tara?{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in-up">

    <!-- Flag + Brand -->
    <div class="text-center mb-4">
      <div style="font-size:3rem;">🇵🇭</div>
      <h1 class="serif mt-2" style="font-size:2rem;">Welcome back.</h1>
      <p class="text-muted small">Sign in to continue planning your Philippine adventure.</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">

      <div class="mb-3">
        <label class="form-label small fw-600 text-muted">Username or Email</label>
        <input type="text" name="identifier" class="form-control auth-input"
               placeholder="Enter username or email" required autofocus>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-600 text-muted">Password</label>
        <input type="password" name="password" class="form-control auth-input"
               placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn-luxury w-100 text-center"
              style="display:block; text-align:center;">
        Sign In
      </button>

    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="text-dark fw-600">
        Create one
      </a>
    </p>

  </div>
</div>
{% endblock %}
