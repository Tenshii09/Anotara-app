{% extends 'base.html' %}
{% block title %}Join Anotara{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in-up">

    <div class="text-center mb-4">
      <div style="font-size:3rem;">🌴</div>
      <h1 class="serif mt-2" style="font-size:2rem;">Begin your journey.</h1>
      <p class="text-muted small">Create a free account to design your perfect Philippine trip.</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">

      <div class="mb-3">
        <label class="form-label small fw-600 text-muted">Username</label>
        <input type="text" name="username" class="form-control auth-input"
               placeholder="e.g. juan_dela_cruz" required minlength="3" maxlength="50" autofocus>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-600 text-muted">Email Address</label>
        <input type="email" name="email" class="form-control auth-input"
               placeholder="you@email.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-600 text-muted">Password</label>
        <input type="password" name="password" class="form-control auth-input"
               placeholder="Minimum 6 characters" required minlength="6">
      </div>

      <button type="submit" class="btn-luxury w-100"
              style="display:block; text-align:center;">
        Create Account
      </button>

    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-dark fw-600">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
